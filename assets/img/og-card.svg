<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b14"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="g" x1="220" y1="140" x2="980" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#2EE6A6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="240" cy="150" r="260" fill="#7C5CFF" opacity=".18"/>
  <circle cx="1040" cy="220" r="320" fill="#2EE6A6" opacity=".12"/>

  <g transform="translate(120 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="960" height="330" rx="28" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.14)"/>

    <g transform="translate(52 58)">
      <g transform="translate(0 8)">
        <path d="M12 112c56-96 200-96 256 0" stroke="url(#g)" stroke-width="18" stroke-linecap="round" fill="none"/>
        <path d="M44 92c36-60 132-60 168 0" stroke="rgba(255,255,255,.75)" stroke-width="12" stroke-linecap="round" fill="none"/>
        <circle cx="44" cy="92" r="12" fill="url(#g)"/>
        <circle cx="212" cy="92" r="12" fill="url(#g)"/>
      </g>

      <text x="320" y="70" fill="rgba(255,255,255,.92)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="56" font-weight="800">NextBridge IT</text>
      <text x="320" y="122" fill="rgba(255,255,255,.78)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="600">Partner-oriented IT consulting & outsourcing</text>
      <text x="320" y="168" fill="rgba(255,255,255,.64)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22">Belgrade HQ • Global delivery</text>

      <g transform="translate(320 210)">
        <rect x="0" y="0" width="430" height="54" rx="18" fill="rgba(124,92,255,.20)" stroke="rgba(255,255,255,.12)"/>
        <text x="18" y="36" fill="rgba(255,255,255,.88)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" font-weight="700">nextbridgeit.com</text>
      </g>
    </g>
  </g>
</svg>
