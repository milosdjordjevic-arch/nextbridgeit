name: Deploy to GitHub Pages

on:
  # Pokreće se na svaki push na main granu
  push:
    branches: [main]
  # Omogućava ručno pokretanje iz Actions taba
  workflow_dispatch:

# Dozvole potrebne za deploy na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Samo jedan deploy istovremeno; ne prekida deploy koji je u toku
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # KLJUČNO: uploaduje se dist/ (Astro build), gde jeste index.html
          path: ./dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
